<!DOCTYPE html>
<html>
<head>
    <title>Lista de Personas</title>
</head>
<body>
    <h1>Personas</h1>
    <ul>
        {% for persona in personas %}
            <li>{{ persona.nombre }} - {{ persona.edad }} años - {{ persona.email }} - {{ persona.nacimiento }}</li>
        {% empty %}
            <li>No hay personas registradas.</li>
        {% endfor %}
    </ul>
    <a href="/">Volver al inicio</a>
</body>
</html>
